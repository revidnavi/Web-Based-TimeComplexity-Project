<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complexity Analyzer</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/reset.css">
</head>
<body>
    <!-- Home  Heading -->
    <div class="homeHeading-card">
        <div class="logo-container logo-container-home">
            <div class="logo logo-home">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.8"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
            </div>
            <div class="logo-text logo-text-home">
                <span class="logo-title">AlgoSpark</span>
                <span class="logo-subtitle">Complexity Analyzer</span>
            </div>
        </div>
        <div class="tabButton-home-card">
            <button>Profile</button>
            <button id="logoutButton">Log Out</button>
        </div>
    </div>

    <select id="algorithm">
        <option value="bubble">Bubble Sort</option>
        <option value="merge">Merge Sort</option>
        <option value="binary">Binary Search</option>
        <option value="linear">Linear Search</option>
        <option value="recursive">Recursive</option>
        <option value="dp">Dynamic</option>
    </select>

    <input type="number" id="size" placeholder="Input Size">
    <button id="runButton">Run</button>
    <p id="result"></p>
    <script type="module" src="js/home.js"></script>
</body>
</html>
