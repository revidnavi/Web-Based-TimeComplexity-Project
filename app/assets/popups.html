<template id="popup-message">
    <div class="popup-container">
        <div class="popup-box">
            <div class="popup-content-container">...</div>
            <div class="popup-actions">
                <button class="popup-confirm">OK</button>
            </div>
        </div>
    </div>
</template>

<template id="popup-confirm">
    <div class="popup-container">
        <div class="popup-box">
            <div class="popup-content-container">...</div>
            <div class="popup-actions">
                <button class="popup-confirm">Confirm</button>
                <button class="popup-cancel">Cancel</button>
            </div>
        </div>
    </div>
</template>
