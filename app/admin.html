<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/popups.css">
    <link rel="stylesheet" href="assets/profile.css">
    <link rel="stylesheet" href="assets/style.css">
    <title>Complexity Analyzer</title>
</head>
<body>
    <div class="home-heading-card">
        <div class="logo-container logo-container-home">
            <div class="logo logo-home">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.8" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <div class="logo-text logo-text-home">
                <span class="logo-title">AlgoSpark</span>
                <span class="logo-subtitle">Complexity Analyzer</span>
            </div>
        </div>
        <div class="home-tab-card">
            <button id="dashboard-btn" class="header-tab">Dashboard</button> 
            <button id="algorithms-btn" class="header-tab">Algorithms</button>
            <button id="home-button"  class="header-tab">Home</button>
            <button id="profile-button" class="header-tab">Profile</button>
        </div>
    </div>

    <hr>
    
    <div id="dashboard">
        <div id="chart-container">
            <h1>All Users' Results</h1>
            <canvas id="theChart"></canvas>
        </div>
        
        <div id="user-container">
            <template id="user-template">
                <p>Email: <span class="email"></span></p>
                <p>Created at: <span class="create-at"></span></p>
                <button class="change-pass">Change Password</button>
                <button class="deact-user">Deactivate</button>
            </template>
        </div>
    </div>

    <div id="algos" style="display: none;"> 
        <div id="algos-container">
            
        </div>
        <hr>
        <button id="new-algo-button">Add new algorithm</button>
        <div id="algo-form" style="display: none;">
            <h3 id="algo-form-title">Add new algorithm</h3>
            <input type="hidden" id="algo-id">
            <input type="text" id="algo-name" placeholder="Algorithm name">
            <input type="text" id="category" placeholder="Category">
            <input type="text" id="time-best" placeholder="Time best">
            <input type="text" id="time-avg" placeholder="Time avg">
            <input type="text" id="time-worst" placeholder="Time worst">
            <input type="text" id="space-complexity" placeholder="Space complexity">
            <label for="algo-active">Active:</label>
                <input type="checkbox" id="algo-active">
            <button id="submit-algo">Submit</button>
        </div>
    </div>
    
    <template id="algo-card-template"> <!-- Template for the algorithm card that goes in algos-container-->
        <div class="algo-card">
            <span class="algo-name"></span>
            <span class="category"></span>
            <span class="time-best"></span>
            <span class="time-avg"></span>
            <span class="time-worst"></span>
            <span class="space-complexity"></span>
            <span class="active"></span>
            <button class="edit-algo">Edit</button>
            <button class="delete-algo">Delete</button>
        </div>
    </template>
    
    <script type="module" src="js/admin.js"></script>
</body>
</html>
