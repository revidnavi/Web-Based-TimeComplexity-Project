<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/utilities.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/reset.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="assets/popups.css">
    <title>Complexity Analyzer</title>
</head>
<body>
    <div id="toast-container"></div>
    <!-- Logo -->
    <div class="logo-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.8"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
        </div>
        <div class="logo-text">
            <span class="logo-title">AlgoSpark</span>
            <span class="logo-subtitle">Complexity Analyzer</span>
        </div>
    </div>

    <!-- Signup Page -->
    <div id="form-card">
        <div class="title-header">
           <h1>Welcome</h1>
            <p>Sign in or create account to analyze algorithms</p>
       </div>

         <div class="auth-card">
            <div class="tab-group">
                <button class="tab active" id="gotoLogin">Login</button>
                <button class="tab" id="gotoSignup">Sign Up</button>
            </div>
        </div>
        
        <div id="signupForm"> 
        <div class="signup-content">
            <label>Email</label>
            <input type="text" id="signupEmail" placeholder="Enter email" required>
            <label>Password</label>
            <input type="password" id="signupPass0" placeholder="Enter Password" required>
            <label>Confirm Password</label>
            <input type="password" id="signupPass1" placeholder="Confirm Password" required>
            <button class="custom-buttons" id="sendCodeButton">Send Verification Code</button>
        </div>

        <!-- Verification Page -->
        <div id="verifyPanel" style="display: none;">
                <div class="verify-info">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                     <rect width="24" height="24" rx="4" fill="#eff6ff"/>
                    <path d="M4 8l8 5 8-5" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
                    <rect x="4" y="6" width="16" height="12" rx="2" stroke="#2563eb" stroke-width="1.5"/>
                 </svg>
                 <span id="verifyEmailLabel">Verification code sent to you@example.com</span>
                </div>
                <label>Enter 6-digit Code</label>
                <input type="text" id="emailCode" placeholder="123456" maxlength="6" required>
                <button class="custom-buttons" id="signupButton">Verify & Create Account</button>
                <button class="custom-buttons" id="changeEmailButton">Change Email</button>
        </div>
    </div>

    <!-- Login Page -->
    <div id="loginForm">
        <div class="login-content">
        <label for="email">Email</label>
        <input type="text" id="loginEmail" placeholder="Enter email" required>
        <label for="password">Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" required>
        <button class="custom-buttons" id="loginButton" type="submit">Log In</button> 
        </div>
       
    </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
